name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - uses: cachix/cachix-action@v17
        with:
          name: daniel-fahey
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix build --no-link
